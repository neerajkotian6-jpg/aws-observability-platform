AWSTemplateFormatVersion: "2010-09-09"
Description: "AWS Managed Grafana workspace with SSO and CloudWatch"

Parameters:
  WorkspaceName:
    Type: String
    Default: observability-workspace
  SSOOrganizationId:
    Type: String
  AdminGroupId:
    Type: String
  NotificationEmail:
    Type: String

Resources:

  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${WorkspaceName}-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonGrafanaCloudWatchAccess
      Policies:
        - PolicyName: GrafanaSNSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                  - sns:ListTopics
                Resource: "*"

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: !Ref WorkspaceName
      Description: "Observability platform CloudWatch and Grafana"
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn
      DataSources:
        - CLOUDWATCH
      NotificationDestinations:
        - SNS
      GrafanaVersion: "10.4"

  PluginInstallerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${WorkspaceName}-plugin-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaPluginAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - grafana:CreateWorkspaceApiKey
                  - grafana:DeleteWorkspaceApiKey
                  - grafana:DescribeWorkspace
                Resource: "*"

  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${WorkspaceName}-plugin-installer"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt PluginInstallerRole.Arn
      Timeout: 300
      Environment:
        Variables:
          WORKSPACE_ID: !GetAtt GrafanaWorkspace.Id
          WORKSPACE_URL: !Sub "https://${GrafanaWorkspace.Endpoint}"
          PLUGINS: "grafana-piechart-panel,grafana-clock-panel,grafana-worldmap-panel,marcusolsson-json-datasource"
      Code:
        ZipFile: |
          import json, os, urllib.request, urllib.error, boto3

          SUCCESS = "SUCCESS"
          FAILED = "FAILED"

          def send(event, context, status, data={}, reason=""):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See log stream: {context.log_stream_name}",
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data
              })
              url = event["ResponseURL"]
              req = urllib.request.Request(url, data=body.encode(), method="PUT")
              req.add_header("Content-Type", "")
              req.add_header("Content-Length", str(len(body)))
              urllib.request.urlopen(req)

          def handler(event, context):
              print("Event:", json.dumps(event))
              try:
                  if event["RequestType"] in ("Create", "Update"):
                      workspace_id  = os.environ["WORKSPACE_ID"]
                      workspace_url = os.environ["WORKSPACE_URL"]
                      plugins = os.environ["PLUGINS"].split(",")
                      grafana = boto3.client("grafana")
                      key_resp = grafana.create_workspace_api_key(
                          keyName="cfn-plugin-installer",
                          keyRole="ADMIN",
                          secondsToLive=300,
                          workspaceId=workspace_id
                      )
                      api_key = key_resp["key"]
                      for plugin in plugins:
                          plugin = plugin.strip()
                          url = f"{workspace_url}/api/plugins/{plugin}/install"
                          req = urllib.request.Request(
                              url, method="POST",
                              headers={
                                  "Authorization": f"Bearer {api_key}",
                                  "Content-Type": "application/json"
                              }
                          )
                          try:
                              urllib.request.urlopen(req)
                              print(f"Installed: {plugin}")
                          except urllib.error.HTTPError as e:
                              if e.code != 409:
                                  print(f"Failed {plugin}: {e.code}")
                  send(event, context, SUCCESS, {"Message": "Done"})
              except Exception as e:
                  print(f"Error: {e}")
                  send(event, context, FAILED, reason=str(e))

  GrafanaPlugins:
    Type: Custom::GrafanaPluginInstaller
    DependsOn: GrafanaWorkspace
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !GetAtt GrafanaWorkspace.Id

Outputs:
  GrafanaWorkspaceId:
    Value: !GetAtt GrafanaWorkspace.Id
    Export:
      Name: !Sub "${AWS::StackName}-WorkspaceId"

  GrafanaEndpoint:
    Value: !Sub "https://${GrafanaWorkspace.Endpoint}"
    Export:
      Name: !Sub "${AWS::StackName}-Endpoint"
